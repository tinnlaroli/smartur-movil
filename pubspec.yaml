# esto vendria a ser el package del node 
name: smartur
description: "A new Flutter project."
publish_to: 'none'
version: 2.2.1+4

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_map: ^8.2.2
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.0.10+1
  google_sign_in: ^7.2.0
  http: ^1.6.0
  http_parser: ^4.1.2
  image_picker: ^1.1.2
  latlong2: ^0.9.1
  local_auth: ^2.1.6
  local_auth_android: any
  lottie: ^3.3.2
  shared_preferences: ^2.5.4
  toastification: ^3.0.3
  flutter_staggered_grid_view: ^0.7.0
  url_launcher: ^6.3.2
  share_plus: ^12.0.1
  geolocator: ^13.0.1
  path_provider: ^2.1.5
  screenshot: ^3.0.0
  cached_network_image: ^3.4.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/imgs/
    - assets/lottie/
    - assets/svg/
    - assets/fonts/

  fonts:
      - family: CalSans
        fonts:
          - asset: assets/fonts/CalSans-Regular.ttf

      - family: Outfit
        fonts:
          - asset: assets/fonts/Outfit-VariableFont_wght.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/imgs/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  # Sin adaptive_icon_foreground explícito: flutter_launcher_icons escala
  # automáticamente image_path al 66% del foreground layer, respetando la
  # safe zone de Android (centro 72dp de los 108dp totales del icono adaptativo).
  # Esto evita que el logo se vea recortado o "demasiado grande" en Pixel/Samsung.