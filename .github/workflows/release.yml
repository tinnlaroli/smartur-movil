name: Build & Release APK

on:
  push:
    tags:
      - 'v*' # Se activa cuando creas un tag como v1.0.0, v1.0.1, etc.
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña "Actions" en GitHub

permissions:
  contents: write # Necesario para poder crear la Release y subir archivos

jobs:
  build:
    name: Build & Release Flutter App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (Release)
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }} \
            --dart-define=AI_ENGINE_URL=${{ secrets.AI_ENGINE_URL }} \
            --dart-define=API_BASE_URL_DEV=${{ secrets.API_BASE_URL_DEV }} \
            --dart-define=GOOGLE_SERVER_CLIENT_ID=${{ secrets.GOOGLE_SERVER_CLIENT_ID }} \
            --dart-define=OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}

      - name: Build App Bundle (AAB - for Play Store)
        run: |
          flutter build appbundle --release \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }} \
            --dart-define=AI_ENGINE_URL=${{ secrets.AI_ENGINE_URL }} \
            --dart-define=API_BASE_URL_DEV=${{ secrets.API_BASE_URL_DEV }} \
            --dart-define=GOOGLE_SERVER_CLIENT_ID=${{ secrets.GOOGLE_SERVER_CLIENT_ID }} \
            --dart-define=OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
