name: CI

on:
  push:
  pull_request:

jobs:
  analyze-and-test:
    name: Analyze & Test Flutter App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Analyze
        # --no-fatal-infos: hay ~64 lints de nivel "info" preexistentes
        # (unnecessary_underscores, deprecated_member_use, etc.) que no
        # bloqueaban nada antes de que este workflow existiera. Bloquear solo
        # en warnings/errors reales evita que el gate falle por deuda de
        # estilo no relacionada al cambio que se está subiendo.
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test
